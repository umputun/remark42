version: "2"
run:
  timeout: 6m
  issues-exit-code: 1
linters:
  default: none
  enable:
    - gocritic
    - govet
    - misspell
    - modernize
    - unconvert
    - unused
  settings:
    modernize:
      # omitempty on nested struct fields has no effect, but switching to
      # omitzero would change JSON output for a public API. Keep the tags as-is.
      disable:
        - omitzero
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    paths:
      - third_party$
      - builtin$
      - examples$
formatters:
  enable:
    - goimports
  exclusions:
    generated: lax
    warn-unused: true
    paths:
      - third_party$
      - builtin$
      - examples$
